<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Escudo institucional (interpretación propia, no oficial) de la Escuela José Miguel Carrera Verdugo">
  <!--
    IMPORTANTE: este SVG es una interpretación GRÁFICA PROPIA, inspirada en
    la forma (shield/blasón) y en los colores públicos de la identidad del
    establecimiento (azul marino y dorado/mostaza, observados en el sitio
    oficial escuelajosemcarrera.cl). NO es una copia ni reproducción del
    escudo/logo oficial del colegio (logo.png), que no se incluye aquí por
    no contar con autorización clara de uso. Reemplazar por el archivo
    oficial si en algún momento se dispone de autorización para usarlo.
    Ver docs/ROADMAP.md.
  -->
  <defs>
    <clipPath id="shield-shape">
      <path d="M100 6 L188 38 V118 C188 174 149 213 100 234 C51 213 12 174 12 118 V38 Z" />
    </clipPath>
    <linearGradient id="flame-gradient" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B91C1C" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Fondo blanco del blasón -->
  <path
    d="M100 6 L188 38 V118 C188 174 149 213 100 234 C51 213 12 174 12 118 V38 Z"
    fill="#FFFFFF"
    stroke="#0A0A8F"
    stroke-width="7"
  />

  <g clip-path="url(#shield-shape)">
    <!-- Silueta de montañas (azul marino), evocando la cordillera de Ñuble -->
    <polygon points="-10,150 35,95 60,125 95,70 130,120 160,90 210,150 210,240 -10,240" fill="#0A0A8F" />
    <polygon points="-10,175 45,130 85,160 125,115 165,155 210,120 210,240 -10,240" fill="#050550" opacity="0.85" />

    <!-- Base/plataforma color mostaza para la antorcha -->
    <rect x="82" y="182" width="36" height="14" rx="3" fill="#c7c22c" />

    <!-- Antorcha central -->
    <rect x="96" y="150" width="8" height="40" rx="2" fill="#e8d018" stroke="#0A0A8F" stroke-width="1.5" />
    <path
      d="M100 108 C112 122 116 136 108 148 C104 154 96 154 92 148 C84 136 88 122 100 108 Z"
      fill="url(#flame-gradient)"
    />
    <path
      d="M100 124 C106 132 108 140 103 146 C101 149 99 149 97 146 C92 140 94 132 100 124 Z"
      fill="#FDE68A"
    />
  </g>

  <!-- Filete dorado decorativo, interior al borde azul -->
  <path
    d="M100 14 L180 43 V118 C180 170 144 206 100 226 C56 206 20 170 20 118 V43 Z"
    fill="none"
    stroke="#e8d018"
    stroke-width="3"
  />

  <!-- Borde exterior azul marino (repetido para nitidez sobre el clip) -->
  <path
    d="M100 6 L188 38 V118 C188 174 149 213 100 234 C51 213 12 174 12 118 V38 Z"
    fill="none"
    stroke="#0A0A8F"
    stroke-width="7"
  />

  <text
    x="100"
    y="222"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="13"
    font-weight="bold"
    fill="#0A0A8F"
  >
    J.M.C.V.
  </text>
</svg>
